syntax = "proto3";

package role.v1;

message ImportExportWorkspaceRequest {
  int64 workspace_id = 1;
}

message ImportExportJobByIdRequest {
  int64 workspace_id = 1;
  int64 job_id = 2;
}

message CreateExportJobRequest {
  int64 workspace_id = 1;
  string payload_json = 2;
}

message CreateImportJobRequest {
  int64 workspace_id = 1;
  string payload_json = 2;
}

message ImportExportJobResponse {
  string job_json = 1;
}

message ImportExportJobsResponse {
  repeated string jobs_json = 1;
}

service ImportExportService {
  rpc ListJobs(ImportExportWorkspaceRequest) returns (ImportExportJobsResponse);
  rpc GetJobById(ImportExportJobByIdRequest) returns (ImportExportJobResponse);
  rpc CreateExportJob(CreateExportJobRequest) returns (ImportExportJobResponse);
  rpc CreateImportJob(CreateImportJobRequest) returns (ImportExportJobResponse);
}
