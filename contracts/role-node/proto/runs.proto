syntax = "proto3";

package role.v1;

message RunByIdRequest {
  int64 workspace_id = 1;
  int64 run_id = 2;
}

message CreateRunRequest {
  int64 workspace_id = 1;
  string payload_json = 2;
}

message RunResponse {
  string run_json = 1;
}

service RunsService {
  rpc Create(CreateRunRequest) returns (RunResponse);
  rpc GetById(RunByIdRequest) returns (RunResponse);
  rpc Cancel(RunByIdRequest) returns (RunResponse);
}
